version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sportrun-db
    environment:
      POSTGRES_DB: sportrun
      POSTGRES_USER: sportrun
      POSTGRES_PASSWORD: sportrun123
    ports:
      - '5433:5432'
    volumes:
      - sportrun_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sportrun-redis
    ports:
      - '6380:6379'

volumes:
  sportrun_pgdata:
